<body class="bg-surface min-h-screen flex items-center justify-center p-md md:p-xl font-body-md text-on-surface">
<main class="w-full max-w-[600px] bg-surface-container-lowest rounded-2xl p-xl shadow-[0px_4px_20px_rgba(45,90,39,0.08)] border border-surface-container-high relative overflow-hidden">
<!-- Decorative Header -->
<div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary-container to-secondary-container"></div>
<!-- Logo / Brand -->
<div class="flex items-center gap-sm mb-xl justify-center">
<span class="material-symbols-outlined text-primary text-[32px]">recycling</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Bank Sampah</h1>
</div>
<div class="text-center mb-xl">
<h2 class="font-title-lg text-title-lg text-on-surface mb-sm">Daftar Akun Baru</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Bergabunglah bersama kami untuk lingkungan yang lebih baik.</p>
</div>
<!-- Warning Box -->
<div class="bg-surface-variant border-l-4 border-primary rounded-lg p-md mb-xl flex gap-md items-start">
<span class="material-symbols-outlined text-primary shrink-0 mt-xs">info</span>
<p class="font-body-md text-body-md text-on-surface-variant">
<strong>Perhatian:</strong> Akun Anda membutuhkan verifikasi dari admin sebelum dapat digunakan untuk bertransaksi.
            </p>
</div>
<!-- Registration Form -->
<form action="#" class="space-y-lg" method="POST">
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Full Name -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="fullName">Nama Lengkap</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-[44px] pr-md py-md bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-[#8BC34A] focus:ring-offset-2 focus:border-[#8BC34A] outline-none transition-all duration-300 font-body-md text-body-md" id="fullName" name="fullName" placeholder="John Doe" required="" type="text"/>
</div>
</div>
<!-- WhatsApp Number -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="whatsapp">Nomor WhatsApp</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">phone_android</span>
<input class="w-full pl-[44px] pr-md py-md bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-[#8BC34A] focus:ring-offset-2 focus:border-[#8BC34A] outline-none transition-all duration-300 font-body-md text-body-md" id="whatsapp" name="whatsapp" placeholder="081234567890" required="" type="tel"/>
</div>
</div>
</div>
<!-- Email -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-[44px] pr-md py-md bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-[#8BC34A] focus:ring-offset-2 focus:border-[#8BC34A] outline-none transition-all duration-300 font-body-md text-body-md" id="email" name="email" placeholder="john@example.com" required="" type="email"/>
</div>
</div>
<!-- Full Address -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="address">Alamat Lengkap</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-md text-outline">location_on</span>
<textarea class="w-full pl-[44px] pr-md py-md bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-[#8BC34A] focus:ring-offset-2 focus:border-[#8BC34A] outline-none transition-all duration-300 font-body-md text-body-md resize-none" id="address" name="address" placeholder="Jl. Lingkungan Hijau No. 123, Kelurahan Bersih, Kecamatan Asri..." required="" rows="3"></textarea>
</div>
</div>
<!-- Password -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="password">Kata Sandi</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-[44px] pr-md py-md bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-[#8BC34A] focus:ring-offset-2 focus:border-[#8BC34A] outline-none transition-all duration-300 font-body-md text-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="visibilityIcon">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full bg-[#2D5A27] hover:bg-[#3b6934] text-white font-label-md text-label-md py-md px-xl rounded-lg transition-all duration-300 flex items-center justify-center gap-sm" type="submit">
<span>Daftar Akun</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
<p class="text-center font-body-md text-body-md text-on-surface-variant mt-lg">
                Sudah punya akun? <a class="text-primary hover:underline font-medium" href="/login">Masuk di sini</a>
</p>
</form>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('visibilityIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }
    </script>
</body></html>
