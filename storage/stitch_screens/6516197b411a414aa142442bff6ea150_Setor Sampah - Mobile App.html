<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Setor Sampah - Bank Sampah</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-primary": "#ffffff",

                        "on-tertiary-fixed-variant": "#3e4a41",
                        "on-surface": "#121c2a",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#d9e6da",
                        "surface-bright": "#f8f9ff",
                        "outline": "#72796e",

                        "tertiary-container": "#47534a",

                        "inverse-primary": "#a1d494",
                        "error": "#ba1a1a",
                        "background": "#f8f9ff",
                        "surface-dim": "#d0dbed",
                        "surface-variant": "#d9e3f6",
                        "primary-container": "#2d5a27",
                        "on-primary-container": "#9dd090",
                        "surface-tint": "#3b6934"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "gutter": "24px",
                        "container-max": "1280px",
                        "xs": "4px",
                        "xl": "32px",
                        "2xl": "48px",
                        "3xl": "64px",
                        "base": "4px",
                        "md": "16px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "title-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],

<style>
        body { font-family: 'Inter', sans-serif; background-color: #F9FBF9; }
        .ambient-shadow { box-shadow: 0px 4px 20px rgba(45, 90, 39, 0.08); }
        .focus-ring:focus-within { border-color: #8BC34A; box-shadow: 0 0 0 2px #8BC34A; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-[90px] antialiased">
<!-- Top Navigation (Transactional/Task Focused - Custom Header) -->
<header class="flex items-center justify-between px-md py-sm w-full sticky top-0 z-50 bg-surface border-b border-outline-variant">
<button aria-label="Kembali" class="p-2 text-on-surface hover:bg-surface-container-low rounded-full transition-all">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-primary text-center flex-1">Setor Sampah</h1>
<div class="w-10"></div> <!-- Placeholder to balance flex layout -->
</header>
<!-- Main Content Canvas -->
<main class="p-md space-y-lg max-w-lg mx-auto">
<!-- Form Section -->
<form class="space-y-lg">
<!-- Type of Waste Dropdown -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="waste-type">Jenis Sampah</label>
<div class="relative focus-ring rounded-lg bg-surface border border-outline-variant">
<select class="block w-full pl-sm pr-10 py-sm text-base bg-transparent border-transparent focus:border-transparent focus:ring-0 appearance-none text-on-surface font-body-md text-body-md" id="waste-type" name="waste-type">
<option disabled="" selected="" value="">Pilih jenis material</option>
<option value="plastik">Plastik (Botol, Gelas)</option>
<option value="kertas">Kertas &amp; Kardus</option>
<option value="logam">Logam &amp; Kaleng</option>
<option value="kaca">Kaca (Botol beling)</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-outline">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Weight Input Group -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="waste-weight">Perkiraan Berat</label>
<div class="relative focus-ring rounded-lg bg-surface border border-outline-variant flex items-center">
<input class="block w-full pl-sm pr-12 py-sm bg-transparent border-transparent focus:border-transparent focus:ring-0 text-on-surface font-body-md text-body-md placeholder-outline text-right" id="waste-weight" min="0" name="waste-weight" placeholder="0.0" step="0.1" type="number"/>
<span class="absolute right-sm font-label-md text-label-md text-outline">kg</span>
</div>
</div>
<!-- Photo Upload Area -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface">Bukti Foto</label>
<div class="w-full h-48 border-2 border-dashed border-primary-fixed-dim rounded-2xl bg-surface-container-low flex flex-col items-center justify-center cursor-pointer hover:bg-surface-container-high transition-colors ambient-shadow group relative overflow-hidden" onclick="document.getElementById('file-upload').click()">
<!-- Decorative Graphic/Icon -->
<div class="w-16 h-16 rounded-full bg-[#E8F5E9] flex items-center justify-center mb-xs group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
</div>
<span class="font-label-md text-label-md text-primary mt-2">Ambil Foto Sampah</span>
<span class="font-body-md text-body-md text-on-surface-variant text-sm mt-1 text-center px-4">Pastikan sampah terlihat jelas dan sesuai kategori</span>
<input accept="image/*" capture="environment" class="hidden" id="file-upload" type="file"/>
</div>
</div>
<!-- Notes/Optional Description -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="waste-notes">Catatan (Opsional)</label>
<div class="focus-ring rounded-lg bg-surface border border-outline-variant">
<textarea class="block w-full p-sm bg-transparent border-transparent focus:border-transparent focus:ring-0 text-on-surface font-body-md text-body-md placeholder-outline resize-none" id="waste-notes" name="waste-notes" placeholder="Tambahkan informasi tambahan jika perlu..." rows="3"></textarea>
</div>
</div>
</form>
</main>
<!-- Floating Submit Button -->
<div class="fixed bottom-[80px] left-0 w-full px-md py-sm bg-gradient-to-t from-surface to-transparent z-40">
<div class="max-w-lg mx-auto">
<button class="w-full bg-[#8BC34A] text-[#1F2937] font-title-lg text-title-lg py-sm rounded-lg shadow-lg hover:brightness-110 transition-all duration-300 flex items-center justify-center gap-xs active:scale-[0.98]">
<span class="material-symbols-outlined">send</span>
                Kirim Pengajuan
            </button>
</div>
</div>
<!-- BottomNavBar (Shared Component JSON Rendered) -->
<nav class="md:hidden docked full-width bottom-0 rounded-t-xl shadow-[0px_-4px_20px_rgba(45,90,39,0.08)] bg-surface text-primary font-label-sm text-label-sm font-headline-md text-headline-md text-primary fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-sm pb-md pt-sm">
<!-- Inactive: Home -->
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high transition-all duration-300 cubic-bezier(0.4, 0, 0.2, 1) active:scale-90 rounded-full" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="mt-1">Home</span>
</a>
<!-- Active: Deposit (Semantic Match for "Setor Sampah") -->
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 hover:bg-surface-container-high transition-all duration-300 cubic-bezier(0.4, 0, 0.2, 1) active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="recycling" style="font-variation-settings: 'FILL' 1;">recycling</span>
<span class="mt-1">Deposit</span>
</a>
<!-- Inactive: Withdraw -->
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high transition-all duration-300 cubic-bezier(0.4, 0, 0.2, 1) active:scale-90 rounded-full" href="#">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
<span class="mt-1">Withdraw</span>
</a>
<!-- Inactive: History -->
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high transition-all duration-300 cubic-bezier(0.4, 0, 0.2, 1) active:scale-90 rounded-full" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="mt-1">History</span>
</a>
</nav>
<!-- File Upload Interaction Script -->
<script>
        document.getElementById('file-upload').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            if (fileName) {
                const uploadArea = this.parentElement;
                const icon = uploadArea.querySelector('.material-symbols-outlined');
                const titleText = uploadArea.querySelector('.text-primary');
                
                icon.textContent = 'check_circle';
                icon.classList.remove('text-primary');
                icon.classList.add('text-on-secondary-container');
                uploadArea.querySelector('.bg-\\[\\#E8F5E9\\]').classList.add('bg-secondary-container');
                
                titleText.textContent = 'Foto Berhasil Dipilih';
                uploadArea.querySelector('.text-sm').textContent = fileName;
            }
        });
    </script>
</body></html>
