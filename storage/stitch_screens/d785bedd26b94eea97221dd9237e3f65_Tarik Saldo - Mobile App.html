<main class="pt-[72px] px-md">
<!-- Header Section -->
<div class="mt-lg mb-lg text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Tarik Saldo</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Cairkan tabungan lingkungan Anda</p>

<!-- Info Saldo Card -->
<section class="bg-surface rounded-2xl p-md ambient-shadow mb-lg flex flex-col items-center justify-center text-center">
<div class="w-12 h-12 rounded-full bg-[#E8F5E9] flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Sisa Saldo</span>
<div class="font-display-lg text-display-lg text-primary mt-xs">Rp 450.000</div>
</section>
<!-- Form Tarik Saldo -->
<form class="space-y-lg">
<!-- Nominal Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface" for="nominal">Nominal Penarikan</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 font-body-md text-body-md text-on-surface-variant">Rp</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg py-md pl-[48px] pr-md font-body-lg text-body-lg text-on-surface input-focus-ring transition-all duration-300" id="nominal" max="450000" min="10000" name="nominal" placeholder="0" required="" type="number"/>
</div>
</div>
<!-- Catatan Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface" for="catatan">Catatan / Tujuan Pencairan</label>
<textarea class="w-full bg-surface border border-outline-variant rounded-lg p-md font-body-md text-body-md text-on-surface input-focus-ring transition-all duration-300 resize-none" id="catatan" name="catatan" placeholder="Misal: Beli bibit tanaman" rows="3"></textarea>
</div>
<!-- Info & Action -->
<div class="pt-sm">
<div class="flex items-start gap-xs mb-md bg-surface-container-low p-sm rounded-lg border border-surface-container-highest">
<span class="material-symbols-outlined text-primary text-[20px] mt-[2px]">info</span>
<p class="font-label-md text-label-md text-on-surface-variant">Permintaan akan diproses oleh admin di loket.</p>
</div>

<script>
        // Simple client-side formatting for nominal input
        const nominalInput = document.getElementById('nominal');
        
        nominalInput.addEventListener('input', function(e) {
            // Keep only numbers
            let value = this.value.replace(/[^0-9]/g, '');
            this.value = value;
        });
    </script>
