<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Masuk - Bank Sampah</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom Shadow from Style Guidance */
        .ambient-shadow {
            box-shadow: 0px 4px 20px rgba(45, 90, 39, 0.08);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#72796e",
                        "secondary": "#3e6a00",
                        "on-tertiary": "#ffffff",
                        "on-background": "#121c2a",
                        "secondary-fixed": "#b9f474",
                        "on-secondary": "#ffffff",
                        "tertiary": "#303c34",
                        "inverse-surface": "#27313f",
                        "on-tertiary-container": "#b9c6bb",
                        "tertiary-container": "#47534a",
                        "on-primary-container": "#9dd090",
                        "surface-variant": "#d9e3f6",
                        "inverse-primary": "#a1d494",
                        "primary-fixed": "#bcf0ae",
                        "on-primary-fixed": "#002201",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary": "#154212",
                        "surface-tint": "#3b6934",
                        "surface-dim": "#d0dbed",
                        "on-secondary-fixed": "#0f2000",
                        "error": "#ba1a1a",
                        "background": "#f8f9ff",
                        "secondary-container": "#b9f474",
                        "surface-container-highest": "#d9e3f6",
                        "tertiary-fixed": "#d9e6da",
                        "on-secondary-fixed-variant": "#2e4f00",
                        "secondary-fixed-dim": "#9ed75b",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#437000",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "outline-variant": "#c2c9bb",
                        "surface-container-high": "#dee9fc",
                        "on-primary-fixed-variant": "#23501e",
                        "on-tertiary-fixed-variant": "#3e4a41",
                        "tertiary-fixed-dim": "#bdcabe",
                        "on-tertiary-fixed": "#131e17",
                        "on-surface-variant": "#42493e",
                        "inverse-on-surface": "#eaf1ff",
                        "primary-container": "#2d5a27",
                        "on-surface": "#121c2a",
                        "primary-fixed-dim": "#a1d494",
                        "surface": "#f8f9ff",
                        "surface-container": "#e6eeff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#eff4ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem"
                    },
                    "spacing": {
                        "xl": "32px",
                        "md": "16px",
                        "sm": "8px",
                        "base": "4px",
                        "3xl": "64px",
                        "lg": "24px",
                        "2xl": "48px",
                        "container-max": "1280px",
                        "xs": "4px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "title-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "title-lg": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F9FBF9] text-on-surface min-h-screen flex flex-col justify-center items-center p-md md:p-lg antialiased">
<!-- Main Container -->
<main class="w-full max-w-[420px]">
<!-- Brand Header -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg md:font-display-lg md:text-display-lg text-primary mb-sm">
                Bank Sampah
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                Mengelola Sampah, Menabung Kebaikan.
            </p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-2xl ambient-shadow p-lg md:p-xl transition-all duration-300 hover:shadow-[0px_8px_30px_rgba(45,90,39,0.12)] border border-transparent hover:border-primary/20">
<h2 class="font-title-lg text-title-lg text-on-surface mb-lg">
                Masuk ke Akun Anda
            </h2>
<form action="#" class="space-y-md" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="email">
                        Email
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-[#8BC34A] focus:ring-offset-2 focus:border-transparent transition-all duration-300" id="email" name="email" placeholder="nama@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="password">
                        Kata Sandi
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-[#8BC34A] focus:ring-offset-2 focus:border-transparent transition-all duration-300" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="mt-xs text-right">
<a class="font-label-sm text-label-sm text-primary hover:text-surface-tint transition-colors duration-300" href="#">
                            Lupa kata sandi?
                        </a>
</div>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-white bg-primary-container hover:bg-surface-tint focus:outline-none focus:ring-2 focus:ring-[#8BC34A] focus:ring-offset-2 transition-all duration-300" type="submit">
                        Masuk
                    </button>
</div>
</form>
<!-- Registration Link -->
<div class="mt-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Belum punya akun? 
                    <a class="font-label-md text-label-md text-primary hover:text-surface-tint hover:underline transition-all duration-300" href="#">
                        Daftar di sini
                    </a>
</p>
</div>
</div>
</main>
<!-- Suppressed Navigation & Footer -->
<!-- Navigation and Footer are intentionally suppressed on this linear/transactional screen as per 'Automatic Suppression' rules. -->
</body></html>
